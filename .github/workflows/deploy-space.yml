name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Push to Hugging Face Space
        uses: huggingface/huggingface_hub_action@v1
        with:
          repo-token: ${{ secrets.HF_TOKEN }}
          repo-type: space
          repo-id: abhisheko97/Bill_Splitter_Splitwise