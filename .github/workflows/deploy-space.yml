name: Deploy to HF Space

on:
  push:
    branches:
      - main

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Push to Hugging Face
        uses: huggingface/hub-action@v1
        with:
          repo-token: ${{ secrets.HF_TOKEN }}
          repo-type: space
          repo-id: abhisheko97/Bill_Splitter_Splitwise